---
layout: default
---
<article class="bg-white rounded-2xl shadow-xl p-8 max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold text-red-600 mb-4">{{ page.title }}</h1>
    
    <div class="text-gray-500 text-sm mb-6 border-b border-gray-200 pb-4">
        <span><i class="far fa-calendar mr-2"></i>{{ page.date | date: "%d %B %Y" }}</span>
        {% if page.author %}
        <span class="ml-4"><i class="far fa-user mr-2"></i>{{ page.author }}</span>
        {% endif %}
        {% if page.categories %}
        <span class="ml-4"><i class="far fa-folder mr-2"></i>{{ page.categories | join: ', ' }}</span>
        {% endif %}
    </div>
    
    {% if page.image %}
    <img src="{{ page.image }}" class="w-full rounded-xl mb-6">
    {% endif %}
    
    <div class="post-content">
        {{ content }}
    </div>
</article>

<style>
.post-content { font-size: 1.1rem; line-height: 1.8; }
.post-content h2 { color: #b91c1c; font-size: 1.8rem; margin: 2rem 0 1rem; border-left: 5px solid #f59e0b; padding-left: 1rem; }
.post-content h3 { color: #d97706; font-size: 1.5rem; margin: 1.5rem 0; }
.post-content a { color: #dc2626; text-decoration: underline; }
.post-content a:hover { color: #f59e0b; }
.post-content img { border-radius: 1rem; max-width: 100%; height: auto; margin: 1.5rem 0; }
.post-content blockquote { background: #fef3c7; border-left: 5px solid #f59e0b; padding: 1rem 1.5rem; font-style: italic; margin: 1.5rem 0; border-radius: 0 1rem 1rem 0; }
.post-content ul, .post-content ol { margin-left: 1.5rem; margin-bottom: 1rem; }
</style>
