<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% if page.title %}{{ page.title }} | {% endif %}SIOMAI</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    background:#f9fafb;
}

/* hover animasi */
.hover-scale {
    transition: all 0.3s ease;
}
.hover-scale:hover {
    transform: translateY(-5px);
}

/* artikel */
.post-content {
    line-height:1.8;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="bg-white shadow-md fixed w-full z-50">
<div class="max-w-6xl mx-auto px-4">
<div class="flex justify-between items-center h-16">

<div class="font-bold text-red-600 text-xl">SIOMAI</div>

<!-- DESKTOP MENU -->
<nav class="hidden md:flex space-x-6">
<a href="{{ site.baseurl }}/" class="text-gray-700 hover:text-red-600">Beranda</a>
<a href="{{ site.baseurl }}/peraturan" class="text-gray-700 hover:text-red-600">Peraturan</a>
<a href="{{ site.baseurl }}/standar-harga" class="text-gray-700 hover:text-red-600">Harga</a>
<a href="{{ site.baseurl }}/realisasi" class="text-gray-700 hover:text-red-600">Realisasi</a>
<a href="{{ site.baseurl }}/artikel" class="text-gray-700 hover:text-red-600">Artikel</a>
</nav>

<!-- MOBILE BUTTON -->
<button id="menuBtn" class="md:hidden text-gray-700 text-2xl">
<i class="fas fa-bars"></i>
</button>

</div>
</div>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="hidden md:hidden px-4 pb-4 bg-white">
<a href="{{ site.baseurl }}/" class="block py-2 text-gray-700">Beranda</a>
<a href="{{ site.baseurl }}/peraturan" class="block py-2 text-gray-700">Peraturan</a>
<a href="{{ site.baseurl }}/standar-harga" class="block py-2 text-gray-700">Harga</a>
<a href="{{ site.baseurl }}/realisasi" class="block py-2 text-gray-700">Realisasi</a>
<a href="{{ site.baseurl }}/artikel" class="block py-2 text-gray-700">Artikel</a>
</div>
</header>

<!-- CONTENT -->
<main class="pt-24 pb-12">
<div class="max-w-6xl mx-auto px-4">

{% if page.title and page.url != "/" %}
<h1 class="text-3xl font-bold mb-6 text-gray-800">
{{ page.title }}
</h1>
{% endif %}

<div class="post-content">
{{ content }}
</div>

</div>
</main>

<!-- FOOTER -->
<footer class="bg-gray-900 text-white text-center py-6">
<p>© 2026 SIOMAI - Sistem Informasi PRODAMAI</p>
</footer>

<script>
document.getElementById("menuBtn").onclick = function(){
document.getElementById("mobileMenu").classList.toggle("hidden");
}
</script>

</body>
</html>
