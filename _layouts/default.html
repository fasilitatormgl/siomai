<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} - {{ site.title }}</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --merah:#dc2626;
    --kuning:#f59e0b;
}

body {
    font-family:'Inter',sans-serif;
    background:#fff7ed;
}

/* NAVBAR */
.glass {
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
}

/* BADGE */
.badge-glow {
    animation:glow 2s infinite;
}
@keyframes glow {
    0%,100%{box-shadow:0 0 5px rgba(220,38,38,0.3);}
    50%{box-shadow:0 0 15px rgba(220,38,38,0.6);}
}

/* NAV LINK */
.nav-link {
    position:relative;
}
.nav-link::after {
    content:"";
    position:absolute;
    bottom:-4px;
    left:0;
    width:0;
    height:2px;
    background:linear-gradient(to right,#dc2626,#f59e0b);
    transition:0.3s;
}
.nav-link:hover::after {
    width:100%;
}

/* MOBILE MENU */
.mobile-menu {
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
}
.mobile-menu.show {
    max-height:500px;
}

/* HERO FIX */
.hero {
    position:relative;
    padding:100px 20px 60px;
    text-align:center;
    background: linear-gradient(135deg, #dc2626, #f59e0b);
    color:white;
}
.hero::before {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
}
.hero-content {
    position:relative;
    z-index:2;
}
.hero h1 {
    font-size:42px;
    font-weight:800;
}
.hero p {
    opacity:0.95;
}

/* STAT */
.stat-card {
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
.stat-number {
    font-size:32px;
    font-weight:800;
    color:#f59e0b;
}

/* Styling untuk konten artikel (agar gambar dan teks rapi) */
.post-content {
    font-size: 1.1rem;
    line-height: 1.8;
}
.post-content h2 {
    color: #b91c1c;
    font-size: 1.8rem;
    margin: 2rem 0 1rem;
    border-left: 5px solid #f59e0b;
    padding-left: 1rem;
}
.post-content h3 {
    color: #d97706;
    font-size: 1.5rem;
    margin: 1.5rem 0;
}
.post-content a {
    color: #dc2626;
    text-decoration: underline;
}
.post-content a:hover {
    color: #f59e0b;
}
.post-content img {
    border-radius: 1rem;
    max-width: 100%;
    height: auto;
    margin: 1.5rem 0;
}
.post-content blockquote {
    background: #fef3c7;
    border-left: 5px solid #f59e0b;
    padding: 1rem 1.5rem;
    font-style: italic;
    margin: 1.5rem 0;
    border-radius: 0 1rem 1rem 0;
}
.post-content ul, .post-content ol {
    margin-left: 1.5rem;
    margin-bottom: 1rem;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="glass fixed w-full z-50 border-b border-red-100">
<div class="max-w-7xl mx-auto px-4">
<div class="flex justify-between items-center h-16">

<div class="flex items-center space-x-3">
<a href="{{ site.baseurl }}/"
class="text-3xl font-extrabold bg-gradient-to-r from-red-600 to-yellow-500 bg-clip-text text-transparent">
SIOMAI
</a>

<span class="badge-glow px-4 py-1 rounded-full text-sm font-semibold"
style="background:#fde2e2; color:#dc2626;">
🔥 Prodamai
</span>
</div>

<div class="hidden md:flex space-x-8">
<a href="{{ site.baseurl }}/" class="nav-link text-gray-700">Beranda</a>
<a href="{{ site.baseurl }}/peraturan" class="nav-link text-gray-700">Peraturan</a>
<a href="{{ site.baseurl }}/standar-harga" class="nav-link text-gray-700">Harga</a>
<a href="{{ site.baseurl }}/realisasi" class="nav-link text-gray-700">Realisasi</a>
<a href="{{ site.baseurl }}/artikel" class="nav-link text-gray-700">Artikel</a>
</div>

<button onclick="toggleMenu()" class="md:hidden text-xl text-gray-700">
<i class="fas fa-bars"></i>
</button>

</div>
</div>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="mobile-menu md:hidden glass border-t border-red-100 px-6">

<a onclick="closeMenu()" href="{{ site.baseurl }}/" class="flex items-center gap-2 py-3 nav-link text-gray-700">
<i class="fas fa-home"></i> Beranda
</a>

<a onclick="closeMenu()" href="{{ site.baseurl }}/peraturan" class="flex items-center gap-2 py-3 nav-link text-gray-700">
<i class="fas fa-file-alt"></i> Peraturan
</a>

<a onclick="closeMenu()" href="{{ site.baseurl }}/standar-harga" class="flex items-center gap-2 py-3 nav-link text-gray-700">
<i class="fas fa-tags"></i> Harga
</a>

<a onclick="closeMenu()" href="{{ site.baseurl }}/realisasi" class="flex items-center gap-2 py-3 nav-link text-gray-700">
<i class="fas fa-chart-bar"></i> Realisasi
</a>

<a onclick="closeMenu()" href="{{ site.baseurl }}/artikel" class="flex items-center gap-2 py-3 nav-link text-gray-700">
<i class="fas fa-newspaper"></i> Artikel
</a>

</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-content">

<h1>SIOMAI</h1>
<p class="mt-2 text-lg">Sistem Informasi PRODAMAI</p>
<p class="mt-2 text-sm">Program Pemberdayaan Masyarakat Kota Magelang</p>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-10">

<div class="stat-card">
<div class="stat-number">70</div>
<div class="text-gray-500 text-sm">Fasilitator</div>
</div>

<div class="stat-card">
<div class="stat-number">17</div>
<div class="text-gray-500 text-sm">Kelurahan</div>
</div>

<div class="stat-card">
<div class="stat-number">48</div>
<div class="text-gray-500 text-sm">Kegiatan</div>
</div>

<div class="stat-card">
<div class="stat-number">92%</div>
<div class="text-gray-500 text-sm">Realisasi</div>
</div>

</div>

</div>
</section>

<!-- CONTENT -->
<main class="py-12">
<div class="max-w-7xl mx-auto px-4">
    <div class="post-content">
        {{ content }}
    </div>
</div>
</main>

<!-- FOOTER -->
<footer class="bg-gray-900 text-white py-12">
<div class="max-w-7xl mx-auto px-4 text-center">
<p class="text-gray-400 text-sm">
© 2026 {{ site.author }} - SIOMAI PRODAMAI
</p>
</div>
</footer>

<script>
function toggleMenu(){
    document.getElementById("mobileMenu").classList.toggle("show");
}
function closeMenu(){
    document.getElementById("mobileMenu").classList.remove("show");
}
</script>

</body>
</html>
