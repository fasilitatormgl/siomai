[build]
  command = "jekyll build"
  publish = "_site"

[build.environment]
  JEKYLL_ENV = "production"
  NODE_VERSION = "18"

[context.production]
  environment = { JEKYLL_ENV = "production" }

[context.deploy-preview]
  command = "jekyll build --future"
  environment = { JEKYLL_ENV = "development" }