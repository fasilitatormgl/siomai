<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATAGOR - Monitoring</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    background: linear-gradient(135deg, #fff9f0, #fff5e6);
}
.card {
    background: white;
    border-radius: 1.5rem;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.btn {
    background: linear-gradient(135deg, #dc2626, #f59e0b);
    color: white;
    padding: 10px;
    border-radius: 999px;
    font-weight: bold;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-5xl">

<!-- LOGIN -->
<div id="loginBox" class="card p-8 max-w-md mx-auto text-center">
    <h1 class="text-2xl font-bold mb-2">BATAGOR</h1>
    <p class="text-gray-500 mb-4">Masukkan Password</p>

    <input type="password" id="password" placeholder="Password"
        class="w-full p-3 border rounded-lg mb-3">

    <button onclick="login()" class="btn w-full">Masuk</button>
    <p id="error" class="text-red-500 mt-3 hidden">Password salah</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold">BATAGOR</h1>
        <p class="text-gray-500">Monitoring Fasilitator</p>
    </div>

    <div class="card p-4 mb-6">
        <div class="flex justify-between mb-3">
            <h2 class="font-bold">📊 Monitoring Utama</h2>
            <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vTK5CzQv569P1NPaKbqvLlvjZglfysPrH8iU_9tmblXHXFnAl4T6eoHhq_VjvWIFTQBe99wmOJr3nom/pubhtml?widget=true&headers=false"
               target="_blank"
               class="text-red-600 font-bold">Buka</a>
        </div>

        <iframe 
            src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTK5CzQv569P1NPaKbqvLlvjZglfysPrH8iU_9tmblXHXFnAl4T6eoHhq_VjvWIFTQBe99wmOJr3nom/pubhtml?widget=true&headers=false"
            class="w-full h-[500px] rounded-lg">
        </iframe>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
        <a href="https://docs.google.com"
           target="_blank"
           class="card p-4 text-center hover:shadow-lg">
           📅 Rekapan Bulanan
        </a>

        <a href="https://docs.google.com"
           target="_blank"
           class="card p-4 text-center hover:shadow-lg">
           🏢 Data OPD
        </a>
    </div>

</div>

</div>

<script>

// PASSWORD (ubah di sini)
const PASSWORD = "batagor2026";

function login() {
    const input = document.getElementById("password").value;

    if (input === PASSWORD) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
    } else {
        document.getElementById("error").classList.remove("hidden");
    }
}

// Enter key
document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") login();
});

</script>

</body>
</html>
