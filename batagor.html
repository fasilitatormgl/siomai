<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATAGOR - Akses Internal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff9f0 0%, #fff5e6 100%);
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-grad {
            background: linear-gradient(135deg, #dc2626, #f59e0b);
            transition: all 0.3s;
        }
        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(220,38,38,0.4);
        }
        .error {
            color: #dc2626;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        /* Animasi loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-5xl w-full">
        <!-- Card Login -->
        <div id="loginCard" class="glass-card p-8 text-center max-w-md mx-auto">
            <div class="inline-block p-4 bg-gradient-to-r from-red-600 to-yellow-600 rounded-2xl mb-4">
                <i class="fas fa-lock text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">BATAGOR</h1>
            <p class="text-gray-600 mb-6">Bagan Tabel Monitoring Fasilitator</p>
            <p class="text-sm text-gray-500 mb-6">Akses internal – masukkan kata sandi</p>

            <div class="mb-4">
                <input type="password" id="password" placeholder="Kata Sandi" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-300">
            </div>
            <button id="loginBtn" class="btn-grad w-full text-white font-bold py-3 rounded-xl">
                <i class="fas fa-sign-in-alt mr-2"></i> Masuk
            </button>
            <div id="errorMsg" class="error hidden mt-3"></div>
            <p class="text-xs text-gray-400 mt-6">Hubungi admin jika lupa kata sandi</p>
        </div>

        <!-- Dashboard (tersembunyi) -->
        <div id="dashboard" class="hidden"></div>
    </div>

    <script>
        // ========== KONFIGURASI ==========
        // Password yang benar (di-hash dengan SHA-256)
        // Untuk keperluan demo, password: "batagor2026"
        // Hash: 5c3e4a7b2f8d9e1a6b4c8d7e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9
        const CORRECT_PASSWORD_HASH = "5c3e4a7b2f8d9e1a6b4c8d7e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9"; // GANTI dengan hash nyata

        // Konten dashboard yang dienkripsi (Base64 + XOR)
        // Data asli adalah HTML dashboard (tanpa link asli)
        // Link asli akan didekripsi saat runtime
        const encryptedHTML = "UEsDBBQAAAAIA..."; // Ganti dengan konten terenkripsi nyata

        // Fungsi hash password (SHA-256)
        async function hashPassword(pwd) {
            const encoder = new TextEncoder();
            const data = encoder.encode(pwd);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Fungsi dekripsi sederhana (XOR dengan kunci)
        function decryptXOR(encoded, key) {
            // encoded adalah string Base64, decode dulu
            let decoded;
            try {
                decoded = atob(encoded);
            } catch(e) {
                return "";
            }
            let result = "";
            for (let i = 0; i < decoded.length; i++) {
                result += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        // Dashboard HTML yang sudah didekripsi (hardcoded untuk demo, sebaiknya enkripsi)
        // Untuk keamanan lebih, semua link spreadsheet dienkripsi dan didekripsi saat runtime
        const dashboardHTML = `
            <div class="glass-card p-8">
                <div class="text-center mb-6">
                    <div class="inline-block p-4 bg-gradient-to-r from-red-600 to-yellow-600 rounded-2xl mb-4">
                        <i class="fas fa-chart-line text-white text-4xl"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-800">BATAGOR</h1>
                    <p class="text-gray-600">Bagan Tabel Monitoring Fasilitator</p>
                    <div class="w-24 h-1 bg-gradient-to-r from-red-500 to-yellow-500 mx-auto mt-3 rounded-full"></div>
                </div>

                <!-- Info dan Tombol Akses -->
                <div class="bg-white rounded-2xl shadow-xl p-8 mb-12 text-center">
                    <p class="text-lg text-gray-700 mb-6">
                        Akses ke sistem internal monitoring fasilitator, data OPD, dan pelaporan.
                    </p>
                    <div class="flex flex-wrap justify-center gap-4 mb-8">
                        <span class="bg-red-100 text-red-600 px-6 py-2 rounded-full font-semibold shadow-sm">📊 Monitoring</span>
                        <span class="bg-yellow-100 text-yellow-700 px-6 py-2 rounded-full font-semibold shadow-sm">🏢 Data OPD</span>
                        <span class="bg-orange-100 text-orange-700 px-6 py-2 rounded-full font-semibold shadow-sm">📋 Pelaporan</span>
                    </div>
                    <a href="#" id="batagorLink" target="_blank" 
                       class="inline-block bg-gradient-to-r from-red-600 to-yellow-600 text-white px-10 py-4 rounded-full font-bold text-lg shadow-lg hover:shadow-xl transition transform hover:-translate-y-1">
                        <i class="fas fa-lock mr-2"></i> Akses BATAGOR
                    </a>
                </div>

                <!-- Penjelasan singkat -->
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="bg-white rounded-xl shadow-md p-6 text-center hover-scale">
                        <div class="text-3xl mb-3">📊</div>
                        <h3 class="font-bold text-red-600 mb-2">Monitoring</h3>
                        <p class="text-gray-600 text-sm">Pantau progress seluruh fasilitator secara real-time</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6 text-center hover-scale">
                        <div class="text-3xl mb-3">🏢</div>
                        <h3 class="font-bold text-yellow-600 mb-2">Data OPD</h3>
                        <p class="text-gray-600 text-sm">Informasi khusus perangkat daerah</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6 text-center hover-scale">
                        <div class="text-3xl mb-3">📋</div>
                        <h3 class="font-bold text-orange-600 mb-2">Pelaporan</h3>
                        <p class="text-gray-600 text-sm">Laporan bulanan dan arsip kegiatan</p>
                    </div>
                </div>

                <!-- Footer informasi akses -->
                <div class="mt-12 text-center text-sm text-gray-500 border-t border-gray-200 pt-6">
                    <p><i class="fas fa-info-circle mr-1 text-red-500"></i> Halaman ini berisi data internal. Akses terbatas untuk fasilitator dan OPD.</p>
                    <p class="mt-2">Hubungi Admin: <a href="mailto:layanan.prodamai@gmail.com" class="text-red-600 hover:underline">layanan.prodamai@gmail.com</a> | (0293) 123456</p>
                </div>
            </div>
        `;

        // Link BATAGOR yang sebenarnya (dalam bentuk terenkripsi)
        // Simpan link asli di sini dalam bentuk terenkripsi (misal menggunakan XOR sederhana)
        const encryptedLink = "bW9uaXRvcmluZy1saW5r"; // contoh: "monitoring-link" di-base64
        const linkKey = "batagor2026";

        function decryptLink(encrypted, key) {
            try {
                let decoded = atob(encrypted);
                let result = "";
                for (let i = 0; i < decoded.length; i++) {
                    result += String.fromCharCode(decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return result;
            } catch(e) {
                return "";
            }
        }

        // Setelah login sukses, tampilkan dashboard
        function showDashboard() {
            document.getElementById('loginCard').classList.add('hidden');
            const dashboardDiv = document.getElementById('dashboard');
            dashboardDiv.classList.remove('hidden');
            dashboardDiv.innerHTML = dashboardHTML;
            
            // Dekripsi link dan set ke tombol
            const realLink = decryptLink(encryptedLink, linkKey);
            const linkBtn = document.getElementById('batagorLink');
            if (linkBtn && realLink) {
                linkBtn.href = realLink;
            } else {
                // Fallback jika dekripsi gagal
                if (linkBtn) linkBtn.href = "https://sites.google.com/view/batagor-mgl/home";
            }
        }

        // Event login
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const pwd = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            if (!pwd) {
                errorDiv.textContent = "Masukkan kata sandi";
                errorDiv.classList.remove('hidden');
                return;
            }
            
            // Simulasi loading
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> Memeriksa...';
            btn.disabled = true;
            
            const hashed = await hashPassword(pwd);
            if (hashed === CORRECT_PASSWORD_HASH) {
                errorDiv.classList.add('hidden');
                showDashboard();
            } else {
                errorDiv.textContent = "Kata sandi salah!";
                errorDiv.classList.remove('hidden');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Prevent enter key
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
