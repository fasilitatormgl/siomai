title: SIOMAI - PRODAMAI Kota Magelang
email: layanan.prodamai@gmail.com
description: >-
  Sistem Informasi Program Pemberdayaan Masyarakat (PRODAMAI) 
  – Monitoring dan Evaluasi Program Pemberdayaan di Kota Magelang.
baseurl: "/siomai"
url: "https://fasilitatormgl.github.io"
author: Fasilitator PRODAMAI

# Build settings
markdown: kramdown
permalink: /artikel/:year/:month/:day/:title/
plugins:
  - jekyll-feed

# Default front matter untuk halaman
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "posts"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
